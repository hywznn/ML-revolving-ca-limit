<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Revolving and CA Limit Prediction Pipeline</title>
  <desc id="desc">Data preprocessing, feature engineering, modeling, evaluation, and interpretation pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef4f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52616b"/>
    </marker>
    <style>
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .box-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #16213e; }
      .box-text { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .chip { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .arrow { stroke: #52616b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1100" height="360" rx="0" fill="url(#bg)"/>
  <text x="54" y="58" class="title">리볼빙 전환 가능 여부 및 CA 한도금액 예측 파이프라인</text>
  <text x="54" y="84" class="subtitle">회원 속성, 카드 이용 행태, 한도 이력, 이자율 조건을 모델 입력으로 변환해 분류와 회귀를 함께 수행</text>

  <g transform="translate(54 126)" filter="url(#shadow)">
    <rect width="160" height="132" rx="8" fill="#ffffff" stroke="#d8e0e6"/>
    <rect x="18" y="18" width="58" height="24" rx="12" fill="#2f6f73"/>
    <text x="47" y="35" text-anchor="middle" class="chip">DATA</text>
    <text x="18" y="66" class="box-title">회원 통합 데이터</text>
    <text x="18" y="91" class="box-text">이용금액, 한도</text>
    <text x="18" y="112" class="box-text">이자율, 회원 상태</text>
  </g>

  <path d="M 224 192 L 284 192" class="arrow"/>

  <g transform="translate(294 126)" filter="url(#shadow)">
    <rect width="160" height="132" rx="8" fill="#ffffff" stroke="#d8e0e6"/>
    <rect x="18" y="18" width="70" height="24" rx="12" fill="#5b7c99"/>
    <text x="53" y="35" text-anchor="middle" class="chip">CLEAN</text>
    <text x="18" y="66" class="box-title">전처리</text>
    <text x="18" y="91" class="box-text">결측/중복 제거</text>
    <text x="18" y="112" class="box-text">인코딩, 스케일링</text>
  </g>

  <path d="M 464 192 L 524 192" class="arrow"/>

  <g transform="translate(534 126)" filter="url(#shadow)">
    <rect width="160" height="132" rx="8" fill="#ffffff" stroke="#d8e0e6"/>
    <rect x="18" y="18" width="78" height="24" rx="12" fill="#9a6b4f"/>
    <text x="57" y="35" text-anchor="middle" class="chip">FEATURE</text>
    <text x="18" y="66" class="box-title">피처 엔지니어링</text>
    <text x="18" y="91" class="box-text">사용비율, 상호작용</text>
    <text x="18" y="112" class="box-text">한도 변화 신호</text>
  </g>

  <path d="M 704 192 L 764 192" class="arrow"/>

  <g transform="translate(774 126)" filter="url(#shadow)">
    <rect width="160" height="132" rx="8" fill="#ffffff" stroke="#d8e0e6"/>
    <rect x="18" y="18" width="70" height="24" rx="12" fill="#6f5f90"/>
    <text x="53" y="35" text-anchor="middle" class="chip">MODEL</text>
    <text x="18" y="66" class="box-title">모델링</text>
    <text x="18" y="91" class="box-text">분류: Voting</text>
    <text x="18" y="112" class="box-text">회귀: Boosting</text>
  </g>

  <path d="M 944 192 L 1004 192" class="arrow"/>

  <g transform="translate(884 278)">
    <rect width="162" height="42" rx="8" fill="#17202a"/>
    <text x="81" y="27" text-anchor="middle" class="chip">SHAP · LIME · 평가 지표</text>
  </g>

  <path d="M 854 258 C 854 288, 876 299, 884 299" class="arrow"/>

  <g transform="translate(54 292)">
    <text x="0" y="0" class="subtitle">Outputs: RV전환가능여부 분류, CA한도금액 예측, 모델 성능 비교, 설명 가능한 변수 영향 분석</text>
  </g>
</svg>
